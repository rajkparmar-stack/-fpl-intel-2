  greenDim: "#1a3d2a",
  blue:     "#6a9fd8",

  amber:    "#d4924a",
};

const POS_COLOR = { 1: T.amber, 2: T.green, 3: T.blue, 4: T.red };
const POSITIONS = { 1:"GK", 2:"DEF", 3:"MID", 4:"FWD" };

const FDR_PALETTE = {
  1: { bg:"#1a3d2a", border:"#2d6644", text:"#5cba8a", label:"Easy" },
  2: { bg:"#1a3528", border:"#2a5a3a", text:"#4aa870", label:"Easy" },
  3: { bg:"#2d2510", border:"#4a3a18", text:"#c9a84c", label:"Med"  },
  4: { bg:"#2d1a10", border:"#5a3020", text:"#d4724a", label:"Hard" },
  5: { bg:"#2d1010", border:"#5a2020", text:"#e05c5c", label:"Tough"},
};

function fdr(n) { return FDR_PALETTE[n] || FDR_PALETTE[3]; }

function predict(p, gw) {
  const fix = (p.fixtures||[]).find(f=>f.gw===gw);
  if (!fix) return 0;
  const m = [0,1.15,1.07,1.0,0.88,0.72][fix.fdr]||1.0;
  return Math.round(((p.ppg||4)*0.4+(p.form||4)*0.6)*m*10)/10;
}

/* ── Atoms ───────────────────────────────────────────────────────────────────── */
function Divider() {
  return <div style={{height:1, background:`linear-gradient(90deg, transparent, ${T.border}, transparent)`, margin:"4px 0"}} />;
}

function FixturePill({ f }) {
  if (!f) return null;
  const d = fdr(f.fdr);
  return (
    <div style={{
      background:d.bg, border:`1px solid ${d.border}`,
      borderRadius:5, padding:"3px 8px", textAlign:"center", minWidth:44, flexShrink:0,
    }}>
      <div style={{color:T.text, fontSize:11, fontWeight:600, letterSpacing:0.3}}>{f.opp}</div>
      <div style={{color:d.text, fontSize:9, letterSpacing:0.8, marginTop:1}}>{f.venue} · {d.label}</div>
    </div>
  );
}

function ScoreBadge({ val, size="sm" }) {
  const isGold  = val >= 7;
  const isGreen = val >= 5.5;
  const color   = isGold ? T.gold : isGreen ? T.green : T.textDim;
  const bg      = isGold ? T.goldGlow : isGreen ? `${T.green}12` : `${T.border}60`;
  const sz      = size === "lg" ? 44 : 34;
  return (
    <div style={{
      width:sz, height:sz, borderRadius:size==="lg"?10:7, flexShrink:0,
      background:bg, border:`1px solid ${color}33`,
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      <span style={{
        fontFamily:"'DM Serif Display', serif",
        fontSize: size==="lg"?20:14, fontWeight:400, color, lineHeight:1,
      }}>{val}</span>
    </div>
  );
}

function Badge({ label, color = T.gold }) {
  return (
    <span style={{
      background:`${color}20`, border:`1px solid ${color}55`,
      color, fontSize:9, fontWeight:700, padding:"2px 6px",
      borderRadius:3, letterSpacing:1, textTransform:"uppercase",
    }}>{label}</span>
  );
}

/* ── Player Row ──────────────────────────────────────────────────────────────── */
function PlayerRow({ p, gw, swapRole }) {
  const pred   = predict(p, gw);
  const fix    = (p.fixtures||[]).find(f=>f.gw===gw);
  const pc     = POS_COLOR[p.pos]||T.textDim;
  const isIn   = swapRole==="in";
  const isOut  = swapRole==="out";
  const isBench= p.bench && !isIn && !isOut;

  return (
    <div style={{
      display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
      background: isIn  ? `${T.green}0d`
                : isOut ? `${T.red}0a`
                : isBench ? "transparent"
                : T.surface,
      borderRadius:8,
      border:`1px solid ${isIn?`${T.green}44`:isOut?`${T.red}33`:isBench?"transparent":T.border}`,
      opacity: isBench ? 0.55 : 1,
      transition:"opacity 0.2s",
    }}>
      {/* Position chip */}
      <div style={{
        width:30, height:30, borderRadius:6, flexShrink:0,
        background:`${pc}15`, border:`1px solid ${pc}40`,
        display:"flex", alignItems:"center", justifyContent:"center",
        color:pc, fontSize:10, fontWeight:700, letterSpacing:0.5,
      }}>{POSITIONS[p.pos]}</div>

      {/* Name */}
      <div style={{flex:1, minWidth:0}}>
        <div style={{display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
          <span style={{
            fontFamily:"'DM Serif Display', serif",
            fontSize:15, color:T.text, letterSpacing:0.2,
          }}>{p.web_name}</span>
          {p.captain && <Badge label="C" color={T.gold}/>}
          {p.vice    && <Badge label="V" color={T.blue}/>}
          {isIn      && <Badge label="▲ In" color={T.green}/>}
          {isOut     && <Badge label="▼ Out" color={T.red}/>}
          {isBench   && <Badge label="Bench" color={T.textDim}/>}
        </div>
        <div style={{color:T.textDim, fontSize:10, marginTop:2, letterSpacing:0.3}}>
          {p.team} · £{p.cost}m
        </div>
      </div>

      {/* Fixture */}
      {fix && <FixturePill f={fix}/>}

      {/* Predicted pts */}
      <ScoreBadge val={pred}/>
    </div>
  );
}

/* ── GW Panel ────────────────────────────────────────────────────────────────── */
function buildSquad(players, rotations, gw) {
  const squad = players.map(p=>({...p}));
  (rotations[gw]||[]).forEach(sw=>{
    const out = squad.find(p=>p.id===sw.out_id);
    const inn = squad.find(p=>p.id===sw.in_id);
    if(out) out.bench=true;
    if(inn) inn.bench=false;
  });
  return squad;
}

function GWPanel({ gw, players, rotations }) {
  const squad    = buildSquad(players, rotations, gw);
  const starters = squad.filter(p=>!p.bench);
  const bench    = squad.filter(p=>p.bench);
  const captain  = starters.find(p=>p.captain);
  const base     = starters.reduce((s,p)=>s+predict(p,gw),0);
  const capBonus = captain?predict(captain,gw):0;
  const total    = (base+capBonus).toFixed(1);
  const rots     = rotations[gw]||[];

  const swapMap  = {};
  rots.forEach(sw=>{ swapMap[sw.out_id]="out"; swapMap[sw.in_id]="in"; });

  // Captain/VC: rank starters by predicted pts for this GW
  const ranked   = [...starters].sort((a,b)=>predict(b,gw)-predict(a,gw));
  const capPick  = ranked[0];
  const vcPick   = ranked[1];
  const capPts   = capPick  ? predict(capPick,  gw) : 0;
  const vcPts    = vcPick   ? predict(vcPick,   gw) : 0;
  const capFix   = capPick  ? (capPick.fixtures||[]).find(f=>f.gw===gw)  : null;
  const vcFix    = vcPick   ? (vcPick.fixtures||[]).find(f=>f.gw===gw)   : null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Score summary */}
      <div style={{
        display:"flex", gap:12, flexWrap:"wrap",
        background:T.surface, border:`1px solid ${T.border}`,
        borderRadius:12, padding:"18px 20px",
      }}>
        <div style={{flex:1, minWidth:100}}>
          <div style={{color:T.textDim, fontSize:10, letterSpacing:1.5, textTransform:"uppercase", marginBottom:6}}>Predicted Total</div>
          <div style={{
            fontFamily:"'DM Serif Display', serif",
            fontSize:48, color: parseFloat(total)>=65?T.gold:parseFloat(total)>=50?T.green:T.text,
            lineHeight:1, letterSpacing:-1,
          }}>{total}</div>
          <div style={{color:T.textDim, fontSize:11, marginTop:4}}>points incl. captain ×2</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:2,minWidth:200,justifyContent:"center"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:T.bg,borderRadius:7,border:`1px solid ${T.border}`}}>
            <span style={{color:T.textDim,fontSize:11}}>Starting XI base</span>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.text}}>{base.toFixed(1)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:`${T.goldGlow}`,borderRadius:7,border:`1px solid ${T.goldDim}44`}}>
            <span style={{color:T.goldDim,fontSize:11}}>Captain bonus · {captain?.web_name}</span>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.gold}}>+{capBonus.toFixed(1)}</span>
          </div>
        </div>
      </div>

      {/* Captain / VC picks */}
      {capPick && (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:T.gold,fontSize:10,letterSpacing:1.5,textTransform:"uppercase"}}>Armband Picks</span>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          <div style={{display:"flex",gap:0}}>
            {/* Captain */}
            <div style={{flex:1,padding:"16px 18px",borderRight:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <div style={{
                  width:22,height:22,borderRadius:4,
                  background:T.gold,display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#0c0f1a",fontSize:10,fontWeight:800,
                }}>C</div>
                <span style={{color:T.goldDim,fontSize:10,letterSpacing:1.2,textTransform:"uppercase"}}>Captain</span>
              </div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,marginBottom:2}}>{capPick.web_name}</div>
              <div style={{color:T.textDim,fontSize:11,marginBottom:10}}>{capPick.team} · £{capPick.cost}m</div>
              {capFix && <FixturePill f={capFix}/>}
              <div style={{marginTop:12,display:"flex",alignItems:"baseline",gap:6}}>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:T.gold,lineHeight:1}}>{(capPts*2).toFixed(1)}</span>
                <span style={{color:T.goldDim,fontSize:11}}>projected 2× pts</span>
              </div>
              <div style={{marginTop:8,color:T.textDim,fontSize:11,lineHeight:1.7}}>
                Best predicted score this GW ({capPts} base). {capFix ? `${fdr(capFix.fdr).label} fixture vs ${capFix.opp} (${capFix.venue}).` : ""} High-ceiling option.
              </div>
            </div>
            {/* Vice Captain */}
            {vcPick && (
              <div style={{flex:1,padding:"16px 18px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                  <div style={{
                    width:22,height:22,borderRadius:4,
                    background:T.blue,display:"flex",alignItems:"center",justifyContent:"center",
                    color:"#0c0f1a",fontSize:10,fontWeight:800,
                  }}>V</div>
                  <span style={{color:`${T.blue}99`,fontSize:10,letterSpacing:1.2,textTransform:"uppercase"}}>Vice Captain</span>
                </div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,marginBottom:2}}>{vcPick.web_name}</div>
                <div style={{color:T.textDim,fontSize:11,marginBottom:10}}>{vcPick.team} · £{vcPick.cost}m</div>
                {vcFix && <FixturePill f={vcFix}/>}
                <div style={{marginTop:12,display:"flex",alignItems:"baseline",gap:6}}>
                  <span style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:T.blue,lineHeight:1}}>{(vcPts*2).toFixed(1)}</span>
                  <span style={{color:`${T.blue}88`,fontSize:11}}>projected 2× pts</span>
                </div>
                <div style={{marginTop:8,color:T.textDim,fontSize:11,lineHeight:1.7}}>
                  Second-best option. {vcFix ? `${fdr(vcFix.fdr).label} fixture vs ${vcFix.opp} (${vcFix.venue}).` : ""} Solid backup if captain blanks.
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Rotation advice */}
      {rots.length > 0 && (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:T.gold,fontSize:10,letterSpacing:1.5,textTransform:"uppercase"}}>Rotation Advice</span>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
            {rots.map((sw,i)=>(
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{
                  display:"flex",alignItems:"center",gap:6,flexShrink:0,
                  padding:"6px 10px",background:T.bg,borderRadius:7,border:`1px solid ${T.border}`,
                  fontFamily:"'DM Serif Display',serif",fontSize:13,
                }}>
                  <span style={{color:T.red}}>{sw.out_name}</span>
                  <span style={{color:T.textDim,fontSize:10}}>→</span>
                  <span style={{color:T.green}}>{sw.in_name}</span>
                </div>
                <p style={{color:T.textMid,fontSize:11,lineHeight:1.7,margin:0,paddingTop:6}}>{sw.reason}</p>
              </div>
            ))}
          </div>
        </div>
      )}
      {rots.length === 0 && (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px 16px",color:T.textMid,fontSize:12}}>
          ✓ Starting lineup is optimal for this gameweek — no rotations needed.
        </div>
      )}

      {/* Chip Recommendations */}
      {(()=>{
        const ptsTot = parseFloat(total);
        const avgFdr = starters.reduce((s,p)=>{ const f=(p.fixtures||[]).find(x=>x.gw===gw); return s+(f?f.fdr:3); },0)/Math.max(starters.length,1);
        const toughFixtures = starters.filter(p=>{ const f=(p.fixtures||[]).find(x=>x.gw===gw); return f&&f.fdr>=4; }).length;
        const benchPts = bench.reduce((s,p)=>s+predict(p,gw),0);

        // Triple Captain logic: play if captain has easy fixture + high predicted pts
        const capFdrVal = capFix ? capFix.fdr : 3;
        const tcPlay  = capPts >= 7 && capFdrVal <= 2;
        const tcBorder= tcPlay ? `${T.gold}66` : T.border;
        const tcBg    = tcPlay ? `${T.gold}0a` : T.bg;

        // Bench Boost: play if bench is strong (>15 pts combined)
        const bbPlay  = benchPts >= 15;
        const bbBorder= bbPlay ? `${T.green}66` : T.border;
        const bbBg    = bbPlay ? `${T.green}0a` : T.bg;

        // Free Hit: play if 4+ tough fixtures (FDR 4-5) in starting XI
        const fhPlay  = toughFixtures >= 4;
        const fhBorder= fhPlay ? `${T.red}66` : T.border;
        const fhBg    = fhPlay ? `${T.red}0a` : T.bg;

        // Wildcard: play if squad predicted < 45 pts AND avg fdr > 3.5
        const wcPlay  = ptsTot < 45 && avgFdr > 3.5;
        const wcBorder= wcPlay ? `${T.amber}66` : T.border;
        const wcBg    = wcPlay ? `${T.amber}0a` : T.bg;

        const chips = [
          {
            icon:"👑", name:"Triple Captain",
            play: tcPlay,
            reason: tcPlay
              ? `${capPick?.web_name} has a ${fdr(capFdrVal).label.toLowerCase()} fixture (FDR ${capFdrVal}) and is projected ${capPts} pts — tripling him makes sense this week.`
              : `${capPick?.web_name} is projected ${capPts} pts but ${capFdrVal>=3?`facing FDR ${capFdrVal} — not a clear enough fixture to triple`:"hold for a week with an easier fixture"}.`,
            color: T.gold,
          },
          {
            icon:"🪑", name:"Bench Boost",
            play: bbPlay,
            reason: bbPlay
              ? `Your bench is projected ${benchPts.toFixed(1)} pts combined — strong enough to justify activating Bench Boost this week.`
              : `Bench projected at ${benchPts.toFixed(1)} pts. Not worth activating yet — save for a double gameweek when bench value is higher.`,
            color: T.green,
          },
          {
            icon:"🎯", name:"Free Hit",
            play: fhPlay,
            reason: fhPlay
              ? `${toughFixtures} of your starters face FDR 4-5 fixtures this week — a strong case to Free Hit and field a temporary team.`
              : `Only ${toughFixtures} tough fixture${toughFixtures!==1?"s":""} this week. Not a bad enough gameweek to burn your Free Hit — hold it.`,
            color: T.red,
          },
          {
            icon:"🃏", name:"Wildcard",
            play: wcPlay,
            reason: wcPlay
              ? `Squad predicted ${ptsTot} pts with avg FDR ${avgFdr.toFixed(1)} — your squad is underperforming this run. Consider wildcarding to reset.`
              : `Squad looks solid at ${ptsTot} pts projected. Hold the Wildcard for when fixtures turn or form drops significantly.`,
            color: T.amber,
          },
        ];

        return (
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:T.gold,fontSize:10,letterSpacing:1.5,textTransform:"uppercase"}}>Chip Advice</span>
              <div style={{flex:1,height:1,background:T.border}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {chips.map((c,i)=>(
                <div key={c.name} style={{
                  display:"flex",gap:12,alignItems:"flex-start",
                  padding:"13px 16px",
                  background: c.play ? (i%2===0?`${c.color}08`:`${c.color}05`) : "transparent",
                  borderBottom: i<chips.length-1 ? `1px solid ${T.border}` : "none",
                }}>
                  <span style={{fontSize:18,flexShrink:0,marginTop:1}}>{c.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                      <span style={{fontFamily:"'DM Serif Display',serif",fontSize:14,color:T.text}}>{c.name}</span>
                      <div style={{
                        background: c.play ? `${c.color}22` : `${T.border}88`,
                        border: `1px solid ${c.play ? `${c.color}55` : T.border}`,
                        color: c.play ? c.color : T.textDim,
                        fontSize:9, fontWeight:700, padding:"2px 8px",
                        borderRadius:3, letterSpacing:1, textTransform:"uppercase",
                      }}>{c.play ? "▶ Play" : "◼ Hold"}</div>
                    </div>
                    <p style={{color:T.textMid,fontSize:11,lineHeight:1.7,margin:0}}>{c.reason}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Players */}
      <div>
        {[1,2,3,4].map(pos=>{
          const g = starters.filter(p=>p.pos===pos);
          if (!g.length) return null;
          return (
            <div key={pos} style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{color:POS_COLOR[pos],fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>{POSITIONS[pos]}s</span>
                <div style={{flex:1,height:1,background:`${POS_COLOR[pos]}22`}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {g.map(p=><PlayerRow key={p.id} p={p} gw={gw} swapRole={swapMap[p.id]}/>)}
              </div>
            </div>
          );
        })}
        <Divider/>
        <div style={{marginTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{color:T.textDim,fontSize:9,letterSpacing:2,textTransform:"uppercase"}}>Bench</span>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {bench.map(p=><PlayerRow key={p.id} p={p} gw={gw} swapRole={swapMap[p.id]}/>)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Transfers Panel ─────────────────────────────────────────────────────────── */
function TransferCard({ t, idx, netCost, budget, shortfall, locked, recommended, isFree }) {
  const isHigh = t.priority==="HIGH";
  const total  = (t.proj||[]).reduce((a,b)=>a+b,0).toFixed(1);
  const netNum = parseFloat(netCost||0);
  return (
    <div style={{
      background:T.surface,
      border:`1px solid ${recommended ? `${T.gold}66` : locked ? `${T.red}33` : T.border}`,
      borderRadius:12, overflow:"hidden", opacity:locked?0.55:1,
      boxShadow: recommended ? `0 0 0 1px ${T.gold}22` : "none",
    }}>
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"10px 16px", borderBottom:`1px solid ${T.border}`,
        background: recommended ? `${T.gold}0c` : locked ? `${T.red}08` : isHigh ? `${T.red}0a` : `${T.amber}08`,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {recommended && <Badge label="✦ Recommended" color={T.gold}/>}
          {!recommended && <span style={{fontFamily:"'DM Serif Display',serif",fontSize:13,color:T.textMid}}>Transfer {idx+1}</span>}
          {locked && <Badge label={`Need £${shortfall}m more`} color={T.red}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {!locked && recommended && isFree  && <Badge label="Free transfer" color={T.green}/>}
          {!locked && recommended && !isFree && <Badge label="−4pt hit" color={T.red}/>}
          {!locked && !recommended && netNum > 0  && <Badge label={`Net £${netCost}m`} color={T.textDim}/>}
          {!locked && !recommended && netNum <= 0 && <Badge label="Free swap" color={T.green}/>}
          <Badge label={t.priority} color={isHigh?T.red:T.amber}/>
        </div>
      </div>

      <div style={{padding:"14px 16px",display:"flex",gap:14,flexWrap:"wrap"}}>
        {/* OUT */}
        <div style={{flex:1,minWidth:130}}>
          <div style={{color:T.red,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Sell</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:T.text,marginBottom:4}}>{t.out}</div>
          <p style={{color:T.textDim,fontSize:11,lineHeight:1.7,margin:0}}>{t.out_reason}</p>
        </div>

        {/* Arrow */}
        <div style={{display:"flex",alignItems:"center",color:T.border,fontSize:20,paddingTop:20}}>→</div>

        {/* IN */}
        <div style={{flex:1,minWidth:160}}>
          <div style={{color:T.green,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Buy</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:T.text}}>{t.in}</span>
            <span style={{color:T.textDim,fontSize:11}}>{t.in_team} · £{t.in_cost}m</span>
          </div>
          <p style={{color:T.textDim,fontSize:11,lineHeight:1.7,margin:0,marginBottom:12}}>{t.in_reason}</p>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            {(t.proj||[]).map((v,i)=>(
              <div key={i} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",textAlign:"center"}}>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:locked?T.textDim:T.green}}>{v}</div>
                <div style={{color:T.textDim,fontSize:9,letterSpacing:0.5}}>GW+{i}</div>
              </div>
            ))}
            <div style={{background:locked?T.bg:T.goldGlow,border:`1px solid ${locked?T.border:`${T.goldDim}55`}`,borderRadius:6,padding:"5px 12px",textAlign:"center",marginLeft:2}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:locked?T.textDim:T.gold}}>{total}</div>
              <div style={{color:T.goldDim,fontSize:9,letterSpacing:0.5}}>Total</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Upload Panel ────────────────────────────────────────────────────────────── */
function UploadPanel({ onAnalyse }) {
  const [dragging, setDragging] = useState(false);
  const [file,     setFile]     = useState(null);
  const [preview,  setPreview]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);
  const [apiKey,   setApiKey]   = useState(()=>{ try{return localStorage.getItem("fpl_apikey")||"";}catch(e){return "";} });
  const [showKey,  setShowKey]  = useState(false);
  const inputRef = useRef();

  const saveKey = v => { setApiKey(v); try{localStorage.setItem("fpl_apikey",v);}catch(e){} };

  const handleFile = f => {
    if (!f||!f.type.startsWith("image/")) { setError("Please upload a PNG or JPG image."); return; }
    setFile(f); setError(null);
    const r = new FileReader();
    r.onload = e => setPreview(e.target.result);
    r.readAsDataURL(f);
  };

  const handleDrop = useCallback(e => {
    e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]);
  }, []);

  const analyse = async () => {
    if (!file) return;
    if (!apiKey.trim()) { setError("Enter your Anthropic API key above first."); return; }
    setLoading(true); setError(null);
    try {
      const base64 = await new Promise((res,rej)=>{
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAX=1200, r=Math.min(MAX/img.width,MAX/img.height,1);
          const c=document.createElement("canvas");
          c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
          c.getContext("2d").drawImage(img,0,0,c.width,c.height);
          res(c.toDataURL("image/jpeg",0.88).split(",")[1]);
        };
        img.onerror=()=>rej(new Error("Could not load image"));
        img.src=url;
      });

      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true",
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:4000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64}},
            {type:"text",text:`You are an FPL expert. Analyse this squad screenshot and return ONLY valid JSON — no backticks, no explanation.
Structure:
{
  "current_gw": <number>,
  "players": [{ "id":"<slug>","web_name":"<n>","pos":<1-4>,"team":"<3-letter>","cost":<float>,"form":<float>,"ppg":<float>,"bench":<bool>,"captain":<bool>,"vice":<bool>,"fixtures":[{"gw":<n>,"opp":"<3-letter>","venue":"H or A","fdr":<1-5>},{"gw":<n+1>,...},{"gw":<n+2>,...}] }],
  "rotations":{"<gw>":[{"out_id":"<id>","out_name":"<n>","in_id":"<id>","in_name":"<n>","reason":"<why>"}],"<gw+1>":[...],"<gw+2>":[...]},
  "transfers":[{"priority":"HIGH or MEDIUM","out":"<n>","out_reason":"<why>","in":"<n>","in_team":"<3-letter>","in_cost":<float>,"in_reason":"<why>","proj":[<pts>,<pts>,<pts>]}]
}
Include all 15 players. Use real FPL season data for fixtures, form, FDR. Output JSON only.`}
          ]}]
        })
      });

      if (!resp.ok) {
        const body = await resp.text();
        if (resp.status===401) throw new Error("Invalid API key — check it and try again.");
        throw new Error(`API error ${resp.status}: ${body.slice(0,150)}`);
      }
      const rdata = await resp.json();
      if (rdata.type==="error") throw new Error(rdata.error?.message||"API error");
      const raw   = rdata.content?.find(b=>b.type==="text")?.text||"";
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response");
      const parsed = JSON.parse(match[0]);
      if (!parsed.players?.length) throw new Error("No players found in response");
      onAnalyse(parsed, preview);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const keySet = apiKey.trim().length > 10;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:T.surface,border:`1px solid ${keySet?`${T.green}55`:T.goldDim}`,borderRadius:12,padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:14}}>🔑</span>
          <span style={{color:keySet?T.green:T.gold,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700}}>
            {keySet?"API Key Saved":"API Key Required"}
          </span>
          {keySet && <Badge label="✓ Ready" color={T.green}/>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input
            type={showKey?"text":"password"}
            value={apiKey}
            onChange={e=>saveKey(e.target.value)}
            placeholder="sk-ant-api03-..."
            style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:7,padding:"10px 12px",color:T.text,fontFamily:"monospace",fontSize:12,outline:"none"}}
          />
          <button onClick={()=>setShowKey(s=>!s)} style={{background:T.bg,border:`1px solid ${T.border}`,color:T.textDim,borderRadius:7,padding:"0 12px",cursor:"pointer",fontSize:12}}>{showKey?"Hide":"Show"}</button>
        </div>
        <div style={{marginTop:8,color:T.textDim,fontSize:11,lineHeight:1.6}}>
          Get a free key at <span style={{color:T.gold}}>console.anthropic.com</span> → API Keys. Stored on your device only.
        </div>
      </div>

      <div onClick={()=>!loading&&inputRef.current.click()} onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={handleDrop}
        style={{border:`1px dashed ${dragging?T.gold:preview?`${T.green}66`:T.border}`,borderRadius:12,cursor:loading?"default":"pointer",background:dragging?`${T.gold}08`:T.surface,transition:"all 0.2s",overflow:"hidden",minHeight:preview?0:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:preview?0:"28px 20px"}}>
        {preview
          ? <img src={preview} alt="Squad" style={{width:"100%",maxHeight:300,objectFit:"contain",borderRadius:12}}/>
          : <><div style={{fontSize:32,marginBottom:10,opacity:0.5}}>📸</div><div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:T.textMid,marginBottom:4}}>Tap to choose squad screenshot</div><div style={{color:T.textDim,fontSize:12}}>PNG or JPG from your camera roll</div></>
        }
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>

      {preview && !loading && (
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setFile(null);setPreview(null);setError(null)}} style={{flex:1,background:"transparent",border:`1px solid ${T.border}`,color:T.textDim,padding:"10px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Serif Display',serif",fontSize:13}}>Change</button>
          <button onClick={analyse} disabled={!keySet} style={{flex:2,background:keySet?T.gold:"#333",border:"none",color:keySet?"#0c0f1a":T.textDim,padding:"10px",borderRadius:8,cursor:keySet?"pointer":"not-allowed",fontFamily:"'DM Serif Display',serif",fontSize:14,fontWeight:600,letterSpacing:0.5}}>Analyse Squad →</button>
        </div>
      )}
      {!preview && <button onClick={()=>inputRef.current.click()} style={{background:T.gold,border:"none",color:"#0c0f1a",padding:"12px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Serif Display',serif",fontSize:14,fontWeight:600,letterSpacing:0.5}}>Choose Screenshot →</button>}

      {loading && (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:24,textAlign:"center"}}>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.textMid,marginBottom:8}}>Analysing squad…</div>
          <div style={{color:T.textDim,fontSize:12,marginBottom:16}}>Reading fixtures, form and FDR data</div>
          <div style={{height:2,background:T.border,borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",background:`linear-gradient(90deg,transparent,${T.gold},transparent)`,animation:"shimmer 1.4s infinite",width:"40%"}}/></div>
        </div>
      )}
      {error && <div style={{background:`${T.red}0d`,border:`1px solid ${T.red}33`,borderRadius:8,padding:"12px 14px",color:T.red,fontSize:12,lineHeight:1.7}}>⚠ {error}</div>}

      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
        <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>How it works</div>
        {[["🔑","Get a free API key at console.anthropic.com → API Keys"],["📱","Open FPL app → My Team showing all 15 players"],["📸","Screenshot the full pitch view"],["⚽","Upload — AI reads your squad and generates predictions"]].map(([ic,tx])=>(
          <div key={tx} style={{display:"flex",gap:10,marginBottom:8}}><span style={{flexShrink:0,opacity:0.6}}>{ic}</span><span style={{color:T.textMid,fontSize:12,lineHeight:1.6}}>{tx}</span></div>
        ))}
      </div>
    </div>
  );
}

/* ── Overview Cards ──────────────────────────────────────────────────────────── */
function OverviewStrip({ players, rotations, gwList }) {
  return (
    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      {gwList.map((gw,i)=>{
        const squad   = buildSquad(players,rotations,gw);
        const starters= squad.filter(p=>!p.bench);
        const captain = starters.find(p=>p.captain);
        const base    = starters.reduce((s,p)=>s+predict(p,gw),0);
        const capB    = captain?predict(captain,gw):0;
        const total   = (base+capB).toFixed(1);
        const rots    = (rotations[gw]||[]).length;
        const colors  = [T.gold,T.text,T.textMid];
        return (
          <div key={gw} style={{
            flex:1,minWidth:90,
            background:T.surface,border:`1px solid ${i===0?T.goldDim:T.border}`,
            borderRadius:10,padding:"14px 16px",
          }}>
            <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>
              {["This GW","Next GW","+2 GWs"][i]}
            </div>
            <div style={{color:T.textDim,fontSize:10,marginBottom:8}}>GW{gw}</div>
            <div style={{
              fontFamily:"'DM Serif Display',serif",
              fontSize:34,lineHeight:1,color:colors[i],marginBottom:4,
            }}>{total}</div>
            <div style={{color:T.textDim,fontSize:10,marginBottom:8}}>pts predicted</div>
            {rots>0
              ? <div style={{background:`${T.green}14`,border:`1px solid ${T.green}33`,borderRadius:4,padding:"2px 8px",display:"inline-block",color:T.green,fontSize:10}}>{rots} swap{rots>1?"s":""}</div>
              : <div style={{color:T.textDim,fontSize:10}}>No swaps</div>
            }
          </div>
        );
      })}
    </div>
  );
}

/* ── App Shell ───────────────────────────────────────────────────────────────── */
function App() {
  const [data,    setData]    = useState(PRELOADED);
  const [preview, setPreview] = useState(null);
  const [tab,     setTab]     = useState("gw0");
  const [budget,  setBudget]  = useState(()=>{ try{return parseFloat(localStorage.getItem("fpl_budget")||"0.5");}catch(e){return 0.5;} });
  const [freeTx,  setFreeTx]  = useState(()=>{ try{return parseInt(localStorage.getItem("fpl_freetx")||"4");}catch(e){return 4;} });

  useEffect(()=>{ try{localStorage.setItem("fpl_budget",budget);}catch(e){} },[budget]);
  useEffect(()=>{ try{localStorage.setItem("fpl_freetx",freeTx);}catch(e){} },[freeTx]);

  const onAnalyse = (parsed, img) => { setData(parsed); setPreview(img); setTab("gw0"); };
  const gwList    = [data.current_gw, data.current_gw+1, data.current_gw+2];

  const tabs = [
    ...gwList.map((gw,i)=>[`gw${i}`, `GW ${gw}`]),
    ["transfers","Transfers"],
    ["upload","↑ Upload"],
  ];

  return (
    <div className="safe-bottom" style={{
      minHeight:"100vh",
      background:`radial-gradient(ellipse at 20% 0%, #131828 0%, ${T.bg} 60%)`,
      fontFamily:"'DM Sans', sans-serif",
      color:T.text,
      paddingBottom:48,
    }}>
      <div className="safe-top"/>


      {/* ── Header ── */}
      <div style={{
        padding:"28px 24px 20px",
        borderBottom:`1px solid ${T.border}`,
        display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,
      }}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <div style={{
              width:8,height:8,borderRadius:"50%",
              background:`radial-gradient(circle, ${T.gold}, ${T.goldDim})`,
              boxShadow:`0 0 8px ${T.gold}66`,
            }}/>
            <span style={{color:T.textDim,fontSize:10,letterSpacing:2,textTransform:"uppercase"}}>Fantasy Premier League</span>
          </div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:26,letterSpacing:0.5,color:T.text}}>
            Squad Intelligence
          </div>
          <div style={{color:T.textDim,fontSize:11,marginTop:2}}>
            GW{data.current_gw}–{data.current_gw+2} · Raj's Squad
          </div>
        </div>
        {preview && (
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src={preview} alt="squad" style={{width:36,height:36,borderRadius:6,objectFit:"cover",border:`1px solid ${T.border}`}}/>
            <button onClick={()=>{setData(PRELOADED);setPreview(null);setTab("gw0")}} style={{
              background:"transparent",border:`1px solid ${T.border}`,color:T.textDim,
              padding:"6px 14px",borderRadius:7,cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",fontSize:12,
            }}>Reset</button>
          </div>
        )}
      </div>

      <div style={{padding:"20px 24px 0",display:"flex",flexDirection:"column",gap:20}}>
        {/* Overview strip */}
        <OverviewStrip players={data.players} rotations={data.rotations} gwList={gwList}/>

        {/* Tab bar */}
        <div style={{display:"flex",gap:2,background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:3,flexWrap:"wrap"}}>
          {tabs.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{
              flex:1,minWidth:60,
              background: tab===k ? T.surfaceHi : "transparent",
              border: tab===k ? `1px solid ${T.borderHi}` : "1px solid transparent",
              color: tab===k ? T.text : T.textDim,
              padding:"8px 6px",borderRadius:7,cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",fontWeight:tab===k?500:400,
              fontSize:12,letterSpacing:0.3,transition:"all 0.15s",
            }}>{l}</button>
          ))}
        </div>

        {/* Content */}
        {tab.startsWith("gw") && tab!=="upload" && (()=>{
          const idx = parseInt(tab.replace("gw",""));
          return <GWPanel gw={gwList[idx]} players={data.players} rotations={data.rotations}/>;
        })()}

        {tab==="transfers" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* Controls: budget + free transfers */}
            <div style={{
              background:T.surface, border:`1px solid ${T.border}`,
              borderRadius:12, padding:"16px 18px",
              display:"flex", gap:16, flexWrap:"wrap", alignItems:"stretch",
            }}>
              {/* Budget */}
              <div style={{flex:1,minWidth:140,display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>Money in Bank</div>
                  <div style={{color:T.textMid,fontSize:11}}>Free cash after squad value</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>setBudget(b=>Math.max(0,parseFloat((b-0.5).toFixed(1))))} style={{width:30,height:30,borderRadius:6,background:T.bg,border:`1px solid ${T.border}`,color:T.textMid,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <div style={{textAlign:"center",minWidth:52}}>
                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:24,color:T.gold,lineHeight:1}}>£{budget.toFixed(1)}m</div>
                  </div>
                  <button onClick={()=>setBudget(b=>Math.min(20,parseFloat((b+0.5).toFixed(1))))} style={{width:30,height:30,borderRadius:6,background:T.bg,border:`1px solid ${T.border}`,color:T.textMid,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>

              <div style={{width:1,background:T.border,flexShrink:0}}/>

              {/* Free transfers */}
              <div style={{flex:1,minWidth:140,display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>Free Transfers</div>
                  <div style={{color:T.textMid,fontSize:11}}>Transfers without −4pt hit</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>setFreeTx(n)} style={{
                      flex:1, padding:"8px 4px", borderRadius:7, cursor:"pointer",
                      background: freeTx===n ? `${T.gold}22` : T.bg,
                      border: `1px solid ${freeTx===n ? T.goldDim : T.border}`,
                      color: freeTx===n ? T.gold : T.textDim,
                      fontFamily:"'DM Serif Display',serif", fontSize:16,
                      transition:"all 0.15s",
                    }}>{n}</button>
                  ))}
                </div>
                <div style={{color:T.textDim,fontSize:10}}>
                  {freeTx===1?"1 free · extras cost −4pts each"
                  :freeTx===2?"2 free · extras cost −4pts each"
                  :freeTx===3?"3 free · 1 extra = −4pts"
                  :freeTx===4?"4 free · all transfers are free"
                  :"5 free · wildcard or rolled transfers"}
                </div>
              </div>
            </div>

            {/* Smart recommendation engine */}
            {(() => {
              const all = data.transfers || [];

              // Enrich each transfer with sell value, net cost, affordability, pts gain
              const enriched = all.map(t => {
                const selling  = data.players.find(p => p.web_name===t.out || p.web_name?.toLowerCase()===t.out?.toLowerCase());
                const sellVal  = selling ? selling.cost : 0;
                const netCost  = parseFloat((t.in_cost - sellVal).toFixed(1));
                const canAfford= t.in_cost <= sellVal + budget;
                const projTotal= (t.proj||[]).reduce((a,b)=>a+b,0);
                return { ...t, sellVal, netCost, canAfford, projTotal };
              });

              const affordable = enriched.filter(t=>t.canAfford);
              const locked     = enriched.filter(t=>!t.canAfford);

              // Pick optimal set within free transfers (greedy by pts gain, penalise hits)
              // Sort affordable by projected pts descending
              const sorted = [...affordable].sort((a,b)=>b.projTotal-a.projTotal);

              // Build recommendation plan
              const plan = [];
              let remainingFree = freeTx;
              let remainingBudget = budget;

              for (const t of sorted) {
                if (plan.length >= freeTx + 1) break; // never recommend more than free+1
                if (t.netCost <= remainingBudget) {
                  const isFree = remainingFree > 0;
                  const ptsCost = isFree ? 0 : 4;
                  plan.push({ ...t, isFree, ptsCost });
                  remainingBudget = parseFloat((remainingBudget - Math.max(0, t.netCost)).toFixed(1));
                  if (isFree) remainingFree--;
                }
              }

              const planPtsGain   = plan.reduce((s,t)=>s+t.projTotal,0).toFixed(1);
              const planPtsCost   = plan.reduce((s,t)=>s+t.ptsCost,0);
              const planNetBenefit= (parseFloat(planPtsGain) - planPtsCost).toFixed(1);

              return (
                <>
                  {/* Recommended plan banner */}
                  {plan.length > 0 && (
                    <div style={{background:`${T.gold}0d`,border:`1px solid ${T.goldDim}55`,borderRadius:12,padding:"14px 18px"}}>
                      <div style={{color:T.gold,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Recommended Plan · {plan.length} Transfer{plan.length>1?"s":""}</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                        {plan.map((t,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px"}}>
                            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:14,color:T.red}}>{t.out}</span>
                            <span style={{color:T.textDim,fontSize:12}}>→</span>
                            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:14,color:T.green}}>{t.in}</span>
                            {t.isFree
                              ? <Badge label="Free" color={T.green}/>
                              : <Badge label="−4pts" color={T.red}/>
                            }
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 14px",textAlign:"center"}}>
                          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.green,lineHeight:1}}>+{planPtsGain}</div>
                          <div style={{color:T.textDim,fontSize:9,letterSpacing:0.8,marginTop:2}}>Pts gained (3GW)</div>
                        </div>
                        {planPtsCost > 0 && (
                          <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 14px",textAlign:"center"}}>
                            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.red,lineHeight:1}}>−{planPtsCost}</div>
                            <div style={{color:T.textDim,fontSize:9,letterSpacing:0.8,marginTop:2}}>Hit cost</div>
                          </div>
                        )}
                        <div style={{background:T.goldGlow,border:`1px solid ${T.goldDim}44`,borderRadius:7,padding:"6px 14px",textAlign:"center"}}>
                          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.gold,lineHeight:1}}>{planNetBenefit}</div>
                          <div style={{color:T.goldDim,fontSize:9,letterSpacing:0.8,marginTop:2}}>Net benefit</div>
                        </div>
                        <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 14px",textAlign:"center"}}>
                          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.textMid,lineHeight:1}}>£{(budget - plan.reduce((s,t)=>s+Math.max(0,t.netCost),0)).toFixed(1)}m</div>
                          <div style={{color:T.textDim,fontSize:9,letterSpacing:0.8,marginTop:2}}>Remaining bank</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Affordable transfers */}
                  <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase"}}>
                    Affordable · {affordable.length} of {all.length} available
                  </div>
                  {affordable.length===0 && (
                    <div style={{color:T.textDim,fontSize:13,padding:"12px 0"}}>No affordable transfers found. Adjust budget above.</div>
                  )}
                  {affordable.map((t,i)=>{
                    const inPlan = plan.find(p=>p.out===t.out && p.in===t.in);
                    return <TransferCard key={i} t={t} idx={i} netCost={t.netCost.toFixed(1)} budget={budget} recommended={!!inPlan} isFree={inPlan?.isFree}/>;
                  })}

                  {/* Locked / out of budget */}
                  {locked.length > 0 && (
                    <>
                      <div style={{color:T.textDim,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginTop:4,opacity:0.5}}>
                        Out of Budget · increase bank to unlock
                      </div>
                      {locked.map((t,i)=>{
                        const shortfall = (t.in_cost - t.sellVal - budget).toFixed(1);
                        return <TransferCard key={i} t={t} idx={affordable.length+i} netCost={t.netCost.toFixed(1)} budget={budget} shortfall={shortfall} locked/>;
                      })}
                    </>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {tab==="upload" && <UploadPanel onAnalyse={onAnalyse}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
